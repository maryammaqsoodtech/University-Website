<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Superior University - Gold Campus</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* Header and Logo */
        
   .header {
    background-color: white;
    display: flex;
    align-items: center;
    justify-content: center; /* This centers the logo and text */
    padding: 10px 20px;
/*trbl(trouble)
1p 2p(t&b l&r)
1p 2p 3p(t l&r b)
1p 2p 3p 4p(t r b l)*/
    text-align: center;
     }

        .header img {
            height: 60px;
            margin-right: 15px;
        }

        .header h1 {
            color: purple;
            font-size: 28px;
            margin: 0;
        }

        /* Gold Campus bar */
        .gold-campus {
      background-color: purple;
    color: white;
    text-align: center;
    font-weight: bold;
    padding: 10px 20px;
    margin: 15px auto;
    border-radius: 30px; /*  This makes the border curved like a capsule */
    font-size: 22px;
     }


        /* Navigation */
        .nav {
    display: flex;
    justify-content: center;
    background-color: purple; /* Adds purple background */
    padding: 4px;
}
.nav a {
    padding: 6px 14px;              /* 🔹 smaller padding */
    text-decoration: none;
    color: purple;
    background-color: white;
    border: none;
    margin: 14px;
    border-radius: 15px;
    font-weight: 600;
    font-size: 14px;               /* 🔹 smaller text size */
}

       .nav a:hover {
    background-color: #e0e0e0;
    color: purple;
}


.top-banner {
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: white;
    padding: 20px 0;
    gap: 20px; /* Space between images */
}

.top-banner img {
    max-width: 40%;
    height: auto;
}


        /* Image Section */
        .banner {
            width: 100%;
            display: block;
        }

        /* Campus Section */
        .campus-section {
            display: flex;
            background-color: black;
            color: orange;
            font-size: 36px;
            font-weight: bold;
            text-align: center;
        }
.campus-banner {
    position: relative;
    background-image: url('https://www.superior.edu.pk/wp-content/uploads/2025/05/Gold-Superior-University.webp');
    background-size: cover;
    background-position: center;
    height: 400px;
    width: 100%;
}
.campus-text-overlay {
    position: absolute;
    right: 10%;
    top: 50%;
    transform: translateY(-50%);
    color: yellow;
    font-size: 48px; /* 🔠 Increased font size */
    font-weight: bold;
    text-align: center;
    padding: 20px 30px;  /* 🧱 Padding around text */
    line-height: 1.6;    /* 📏 Space between the lines */
}

        /* Bottom Section */

        .bottom {
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 20px;
            
        }

        .bottom img {
            width: 150px;
          
        }

.highlighted-line {
    text-align: center;
    margin: 0px;
    font-family: Algerian;
   
}

.big-text {
    font-size: 32px;
    font-weight: bold;
    text-transform: uppercase;
    color: black;
}

.small-text {
    font-size: 20px;
    font-weight: normal;
    color: black;
}

.green-text {
    font-size: 28px;
    font-weight: bold;
    color: green;
    text-transform: uppercase;
}

.caps-text {
    font-size: 22px;
    font-weight: bold;
    text-transform: uppercase;
    color: black;
}

    </style>
</head>
<body>

    <!-- Logo & Title -->
    <div class="header">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSf2ziJB3KJQJFkoBSdPE4i8iu0abZ76kRv-w&s" alt="Superior Logo">
        <h1>SUPERIOR UNIVERSITY</h1>
    </div>

    <!-- Gold Campus Bar -->
    <div class="gold-campus">GOLD CAMPUS</div>

    <!-- Navigation Links -->
    <div class="nav">
        <a href="https://www.youtube.com/">Youtube</a>
        <a href="#">About us</a>
        <a href="#">Contact us</a>
        <a href="#">Programs</a>
        <a href="#">Student Life</a>
    </div>

    <!-- Global Experience Banner -->
  <div class="top-banner">
    <img src="https://pbs.twimg.com/media/F-JsfGbakAAcXZN.jpg:large" alt="Global Experience">
    <img src="https://www.superior.edu.pk/wp-content/uploads/2025/05/ranking-1024x319.png" alt="Impact Rankings">
</div>

    <!-- Campus Image and Text -->
    <div class="campus-banner">
    <div class="campus-text-overlay">
        <p>BIGGER<br>BOLDER<br>SUPERIOR</p>
    </div>
</div>

    <!-- Bottom Info -->

    <div class="bottom">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQpBYnxTgLZniQdysLDWPDx2qbql76lBtgfJg&s" alt="Girl">

<div class="highlighted-line">
  <div><span class="big-text">SUPERIOR</span></div>
  <div><span class="small-text">is the only</span></div>
  <div><span class="big-text">UNIVERSITY</span><span class="big-text">FROM</span><span class="green-text">PAKISTAN</span></div>
  <div><span class="small-text">to be featured</span></div>
  <div><span class="small-text">in best practices of</span></div>
  <div><span class="caps-text">SDG’s</span></div>
  <div><span class="small-text">in higher education</span></div>
</div>

        <img src="https://cakccis.superior.edu.pk/wp-content/uploads/2024/01/chairman-the-superior-group-e1698229570456.jpg" alt="Man">
    </div>

</body>
</html>
